<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>关于苍山徒步之家入口方案</title>
    <style>
      :root {
        color: #29312e;
        background: #f4efe8;
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", sans-serif;
      }
      * { box-sizing: border-box; }
      body { margin: 0; padding: 28px 18px 40px; }
      h1 { max-width: 1060px; margin: 0 auto 18px; font-size: 24px; font-weight: 500; letter-spacing: 0; }
      .grid { max-width: 1060px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 18px; align-items: start; }
      .option { display: grid; gap: 9px; }
      .option > strong { color: #65706c; font-size: 13px; font-weight: 500; }
      .phone {
        position: relative;
        height: 520px;
        overflow: hidden;
        border: 1px solid #dfd8cc;
        border-radius: 18px;
        background: #d7ddd2;
        box-shadow: 0 14px 30px rgba(38, 48, 43, .12);
      }
      .photo { position: absolute; inset: 0; background: var(--topic-image) center / cover no-repeat; }
      .shade { position: absolute; inset: 0; }
      .title {
        position: absolute;
        left: 22px;
        right: 22px;
        top: 26px;
        color: #fff;
        font-family: "Songti SC", "STSong", Georgia, serif;
        font-size: 28px;
        font-weight: 400;
        line-height: 1.18;
        text-shadow: 0 2px 16px rgba(0,0,0,.34);
      }
      .links { position: absolute; display: grid; }
      .link { display: grid; grid-template-columns: 25px 1fr; align-items: center; gap: 10px; color: inherit; text-decoration: none; }
      .icon {
        position: relative;
        width: 24px;
        height: 24px;
        border: 1.5px solid currentColor;
        border-radius: 50%;
      }
      .icon::before {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        content: "?";
        font-size: 15px;
        font-weight: 300;
        line-height: 1;
      }

      .a .shade { background: linear-gradient(180deg, rgba(16,28,24,.18), rgba(16,28,24,.54)); }
      .a .links {
        left: 18px;
        right: 18px;
        bottom: 20px;
        gap: 2px;
        padding: 12px 16px;
        border: 1px solid rgba(255,255,255,.36);
        border-radius: 14px;
        color: #f9fbf7;
        background: rgba(24,34,30,.34);
        backdrop-filter: blur(12px);
      }
      .a .link { min-height: 42px; font-size: 20px; font-weight: 300; border-bottom: 1px solid rgba(255,255,255,.22); }
      .a .link:last-child { border-bottom: 0; }

      .b .shade { background: linear-gradient(90deg, rgba(14,26,22,.68), rgba(14,26,22,.24) 58%, rgba(14,26,22,.08)); }
      .b .links {
        left: 0;
        top: 136px;
        bottom: 0;
        width: 74%;
        align-content: start;
        gap: 0;
        padding: 10px 0 0 18px;
        color: #fffaf0;
      }
      .b .link { min-height: 58px; padding-right: 16px; font-size: 21px; font-weight: 300; border-bottom: 1px solid rgba(255,255,255,.23); }

      .c .shade { background: linear-gradient(180deg, rgba(255,250,240,.06), rgba(255,250,240,.62)); }
      .c .title { color: #26312d; text-shadow: 0 1px 16px rgba(255,255,255,.8); }
      .c .links {
        left: 16px;
        right: 16px;
        bottom: 16px;
        gap: 8px;
        color: #35413e;
      }
      .c .link {
        min-height: 47px;
        padding: 0 14px;
        border-radius: 999px;
        background: rgba(255,250,240,.9);
        box-shadow: 0 7px 18px rgba(40,48,43,.12);
        font-size: 19px;
        font-weight: 300;
      }

      .d .shade { background: linear-gradient(180deg, rgba(18,34,29,.1), rgba(18,34,29,.46)); }
      .d .links {
        left: 20px;
        right: 20px;
        top: 150px;
        gap: 10px;
        color: #fff;
      }
      .d .link {
        min-height: 54px;
        padding: 0 14px;
        border: 1px solid rgba(255,255,255,.34);
        border-radius: 10px;
        background: rgba(255,255,255,.14);
        backdrop-filter: blur(8px);
        font-size: 20px;
        font-weight: 300;
      }

      .e .shade { background: linear-gradient(180deg, rgba(12,20,17,.2), rgba(12,20,17,.7)); }
      .e .title { top: auto; right: 34px; bottom: 262px; left: 28px; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", sans-serif; font-weight: 300; letter-spacing: 0; text-align: left; }
      .e .links {
        left: 28px;
        right: 28px;
        bottom: 26px;
        gap: 0;
        color: #f7f3eb;
      }
      .e .link {
        min-height: 50px;
        grid-template-columns: 28px 1fr;
        gap: 14px;
        font-size: 20px;
        font-weight: 300;
      }
      .e .link + .link { border-top: 1px solid rgba(255,255,255,.25); }
      .e .icon { background: rgba(255,255,255,.08); }
    </style>
  </head>
  <body>
    <h1>入口放在专题照片上的 5 种方案</h1>
    <section class="grid" id="grid"></section>
    <script>
      const labels = ["我们从哪里来?", "我们在做什么？", "我们的向导是谁？", "怎么联系咨询？"];
      const options = [
        ["a", "A 玻璃底栏"],
        ["b", "B 左侧清单"],
        ["c", "C 温润胶囊"],
        ["d", "D 半透明卡片"],
        ["e", "E 极简底部"]
      ];
      const links = labels.map((label) => `<a class="link" href="#"><span class="icon"></span><span>${label}</span></a>`).join("");

      async function boot() {
        const data = await fetch("./data/runtime-data.json").then((response) => response.json());
        const page = data.topicPages.find((item) => item.slug === "us") || data.topicPages[0];
        document.documentElement.style.setProperty("--topic-image", `url("${page.imageUrl}")`);
        document.querySelector("#grid").innerHTML = options.map(([kind, name]) => `
          <article class="option">
            <strong>${name}</strong>
            <div class="phone ${kind}">
              <div class="photo"></div>
              <div class="shade"></div>
              <div class="title">关于苍山徒步之家</div>
              <nav class="links">${links}</nav>
            </div>
          </article>
        `).join("");
      }

      boot();
    </script>
  </body>
</html>
