<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dali Trip Demo</title>
  <style>
    :root {
      --ink: #232b28;
      --muted: #6f7f79;
      --line: #dfe6e2;
      --paper: #fbf6ec;
      --card: #ffffff;
      --blue: #28aeda;
      --green: #47655a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    main {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0 72px;
    }

    .hero {
      padding: 34px 0 28px;
      border-bottom: 1px solid rgba(35, 43, 40, 0.12);
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--green);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 720px;
      font-size: clamp(34px, 6vw, 64px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .hero p {
      max-width: 660px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.8;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      margin-top: 30px;
    }

    .card {
      min-height: 250px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--card);
      text-decoration: none;
      color: inherit;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(40, 174, 218, 0.55);
      box-shadow: 0 16px 40px rgba(35, 43, 40, 0.08);
    }

    .card strong {
      display: block;
      font-size: 26px;
      line-height: 1.25;
    }

    .card p {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .card span {
      width: fit-content;
      margin-top: 26px;
      padding: 10px 14px;
      border-radius: 5px;
      color: #fff;
      background: var(--blue);
      font-size: 14px;
      font-weight: 700;
    }

    .note {
      margin-top: 26px;
      padding: 16px 18px;
      border: 1px solid rgba(71, 101, 90, 0.18);
      border-radius: 8px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.58);
      font-size: 14px;
      line-height: 1.75;
    }

    @media (max-width: 820px) {
      main { width: min(430px, calc(100% - 24px)); padding-top: 24px; }
      .grid { grid-template-columns: 1fr; }
      .card { min-height: 190px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <p class="eyebrow">DALI TRIP MVP</p>
      <h1>苍山徒步之家演示入口</h1>
      <p>这是当前版本的测试入口。客户可以看活动和预订流程，后台可以管理活动、排班、领队、博客和首页，领队端可以处理订单。</p>
    </section>

    <section class="grid" aria-label="演示入口">
      <a class="card" href="./apps/customer-miniapp/?v=demo">
        <div>
          <strong>客户小程序</strong>
          <p>首页、活动详情、按日期预约、评价、博客、领队档案等客户看到的界面。</p>
        </div>
        <span>打开客户端</span>
      </a>

      <a class="card" href="./apps/admin-web/?v=demo&view=activities">
        <div>
          <strong>后台管理</strong>
          <p>活动、排班、订单、评价、领队、标签、博客、首页拖拽编辑等管理功能。</p>
        </div>
        <span>打开后台</span>
      </a>

      <a class="card" href="./apps/manager-miniapp/?v=demo">
        <div>
          <strong>领队管理端</strong>
          <p>移动端查看订单、取消订单、核销、查看授权组数据和客户信息。</p>
        </div>
        <span>打开管理端</span>
      </a>
    </section>

    <p class="note">现在这个地址是本地演示，只能在这台电脑上打开。给朋友远程测试时，需要再部署到服务器或发布微信小程序体验版。</p>
  </main>
</body>
</html>
